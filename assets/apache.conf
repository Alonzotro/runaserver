<VirtualHost *:80>
    ServerName {sitio}.lan
    DocumentRoot {web_dir}

    <Directory {web_dir}>
        AllowOverride All
        Require all granted
    </Directory>

    <FilesMatch "\.php$">
        <IfModule mod_proxy_fcgi.c>
            SetHandler "proxy:unix:/run/php/php{ver}-fpm.sock|fcgi://localhost"
        </IfModule>
    </FilesMatch>
</VirtualHost>