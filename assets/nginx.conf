server {
    # Indica que Nginx escuchará en el puerto 80 (HTTP)
    listen 80;

    # [Equivalente a ServerName y ServerAlias]
    # Puedes poner ambos nombres en la misma línea separados por un espacio
    server_name astromar.lan www.astromar.lan;

    # [Equivalente a DocumentRoot]
    root /var/www/astromar;

    # [Equivalente a DirectoryIndex]
    index info.php;

    # [Equivalente a Alias /computacion /var/www/computacion]
    # Ojo con la barra final (/): en Nginx, si la ubicación termina en /computacion,
    # el alias físico debe terminar en /computacion/ para evitar problemas de rutas.
    location /computacion {
        alias /var/www/computacion/;
        index info.php index.html;
    }

    # Configuración general para URLs amigables (Recomendado tenerlo siempre)
    location / {
        try_files $uri $uri/ /info.php?$query_string;
    }

    # [Equivalente a <FilesMatch "\.php$"> y SetHandler]
    # Procesa todos los archivos que terminen en .php
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        
        # Aquí conectas directamente con el FPM de PHP 8.5 para este sitio web
        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
    }

    # [Equivalente a ErrorLog y CustomLog]
    # Nginx usa variables directas. Usamos la ruta estándar de logs de Linux
    error_log /var/log/nginx/astromar_error.log;
    access_log /var/log/nginx/astromar_access.log;
}